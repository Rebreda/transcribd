include:
  - project: "gnome/citemplates"
    file: "flatpak/flatpak_ci_initiative.yml"

variables:
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_DEPTH: 1
    MANIFEST_PATH: "app.drey.Vocalis.Devel.json"
    BUNDLE: "vocalis-dev.flatpak"
    FLATPAK_MODULE: "vocalis"
    RUNTIME_REPO: "https://nightly.gnome.org/gnome-nightly.flatpakrepo"
    APP_ID: "app.drey.Vocalis.Devel"

flatpak:
  extends: '.flatpak@x86_64'
  before_script:
    - flatpak --user install -y org.freedesktop.Sdk.Extension.node20//24.08 org.freedesktop.Sdk.Extension.typescript//24.08

flatpak-aarch64:
  extends: '.flatpak@aarch64'
  before_script:
    - flatpak --user install -y org.freedesktop.Sdk.Extension.node20//24.08 org.freedesktop.Sdk.Extension.typescript//24.08

nightly:
  extends: ".publish_nightly"

eslint:
  image: quay.io/fedora/fedora:latest

  variables:
    LINT_LOG: "eslint-report.txt"
  script:
    - sudo dnf install -y npm
    - npm install
    - npx eslint -o $LINT_LOG --no-color src || { cat $LINT_LOG; false; }
  artifacts:
    paths:
      - ${LINT_LOG}
    when: on_failure