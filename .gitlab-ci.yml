include:
  - project: "gnome/citemplates"
    file: "flatpak/flatpak_ci_initiative.yml"

flatpak:
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_DEPTH: 1
    MANIFEST_PATH: "org.gnome.SoundRecorder.json"
    BUNDLE: "sound-recorder-dev.flatpak"
    FLATPAK_MODULE: "gnome-sound-recorder"
    RUNTIME_REPO: "https://nightly.gnome.org/gnome-nightly.flatpakrepo"
    APP_ID: "org.gnome.SoundRecorderDevel"
  extends: .flatpak
  before_script:
    - flatpak --user install -y org.freedesktop.Sdk.Extension.node18//22.08 org.freedesktop.Sdk.Extension.typescript//22.08

nightly:
  extends: ".publish_nightly"

eslint:
  image: quay.io/fedora/fedora:latest

  variables:
    LINT_LOG: "eslint-report.txt"
  script:
    - sudo dnf install -y yarnpkg
    - yarn install
    - yarn run eslint -o $LINT_LOG --no-color src || { cat $LINT_LOG; false; }
  artifacts:
    paths:
      - ${LINT_LOG}
    when: on_failure