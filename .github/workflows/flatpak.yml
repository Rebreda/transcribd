name: Flatpak Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK and runtime
        run: |
          flatpak --user install -y flathub \
            org.gnome.Sdk//48 \
            org.gnome.Platform//48

      - name: Build Flatpak repo
        run: |
          flatpak-builder --user --force-clean --repo=repo flatpak-build app.rebreda.Transcribd.Devel.json

      - name: Build Flatpak bundle
        run: |
          flatpak build-bundle repo transcribd-devel.flatpak app.rebreda.Transcribd.Devel

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcribd-devel-flatpak
          path: transcribd-devel.flatpak

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-flatpak

    steps:
      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: transcribd-devel-flatpak

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: transcribd-devel.flatpak
          generate_release_notes: true
